# Local demo stack: fake data -> InfluxDB -> Grafana. No real receiver needed.
#   docker compose -f local/docker-compose.yml up
# Then open http://localhost:3000  (anonymous admin; dashboards under "adsb-graphs").
name: adsb-graphs-local

services:
  influxdb:
    # No INFLUXDB_DB auto-init: the "adsb-graphs" hyphen breaks its unquoted
    # CREATE DATABASE. The pusher creates the db with a quoted name instead.
    image: influxdb:1.11
    ports:
      - "8086:8086"

  pusher:
    image: python:3.12-slim
    working_dir: /repo
    volumes:
      - ..:/repo:ro
    environment:
      PUSH_INTERVAL: "5"
    command: python local/push.py
    depends_on:
      - influxdb

  telegraf:
    # Native host/system metrics for the "System" dashboard. Reuses the repo's
    # telegraf.d/20-system.conf unchanged; local telegraf.conf sets the output.
    image: telegraf:1.32
    volumes:
      - ./telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ../telegraf/telegraf.d/20-system.conf:/etc/telegraf/telegraf.d/20-system.conf:ro
    depends_on:
      - influxdb

  grafana:
    image: grafana/grafana:11.2.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_BASIC_ENABLED: "false"
    volumes:
      - ./grafana-datasource.yaml:/etc/grafana/provisioning/datasources/influxdb.yaml:ro
      - ../grafana/provisioning/dashboards/provider.yaml:/etc/grafana/provisioning/dashboards/provider.yaml:ro
      - ../grafana/provisioning/dashboards/adsb.json:/var/lib/grafana/dashboards/adsb-graphs/adsb.json:ro
      - ../grafana/provisioning/dashboards/system.json:/var/lib/grafana/dashboards/adsb-graphs/system.json:ro
    depends_on:
      - influxdb
