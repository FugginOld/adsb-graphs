# Local-stack Telegraf: native host/system inputs only (telegraf.d/20-system.conf),
# output to the compose InfluxDB. The adsb execd input is NOT loaded here — that
# path is the pusher's job. skip_database_creation=true: the db name's hyphen
# breaks Telegraf's unquoted CREATE DATABASE, so the pusher creates it quoted.
[agent]
  interval = "10s"
  round_interval = true
  flush_interval = "10s"
  omit_hostname = false

[[outputs.influxdb]]
  urls = ["http://influxdb:8086"]
  database = "adsb-graphs"
  skip_database_creation = true
